stages:
  - check
  - validate

variables:
  EMACS_VERSION: "30.2"

# Stage 1: Fast checks with Emacs (tangle + parity)
# Fails quickly if you forgot to tangle/commit (~10 seconds)
check-parity:
  stage: check
  image: silex/emacs:${EMACS_VERSION}-alpine
  before_script:
    - apk add --no-cache make git
  script:
    - make tangle
    - make check-parity
  allow_failure: false

# Stage 2: Validate Nix configuration (only runs if parity passes)
# Note: --dry-run only evaluates config (architecture-agnostic)
# Works on Linux runners even for darwin configs
validate-nix:
  stage: validate
  image: nixos/nix:latest
  cache:
    key: nix-packages
    paths:
      - /nix/store/
  before_script:
    - mkdir -p ~/.config/nix
    - echo "experimental-features = nix-command flakes" > ~/.config/nix/nix.conf
    # Install make to reuse Makefile (DRY)
    - nix-env -iA nixpkgs.gnumake
  script:
    - make validate
  allow_failure: false

