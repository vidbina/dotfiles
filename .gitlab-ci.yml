stages:
  - validate

variables:
  EMACS_VERSION: "30.2"

# Combined job: tangle, check parity, and validate Nix config
# Uses a Nix image with Emacs for everything
ci:
  stage: validate
  image: nixos/nix:latest
  before_script:
    # Enable flakes and nix-command
    - mkdir -p ~/.config/nix
    - echo "experimental-features = nix-command flakes" > ~/.config/nix/nix.conf

    # Install Emacs and make for tangling
    - nix-env -iA nixpkgs.emacs nixpkgs.gnumake

  script:
    # Run make tangle (generates config files from org)
    - make tangle

    # Check parity (ensure tangled files match commits, excluding .org)
    - make check-parity

    # Validate Nix configuration (fast, no build)
    - make validate

  allow_failure: false

