name: CI

on:
  push:
    branches: [main]
  pull_request: # all branches — stacked PRs get CI too

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      dotfiles: ${{ steps.filter.outputs.dotfiles }}
      agents: ${{ steps.filter.outputs.agents }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotfiles:
              - '**/*.org'
              - 'flake.nix'
              - 'flake.lock'
              - 'Makefile'
              - '.github/workflows/**'
            agents:
              - 'agents/**'
              - '.github/workflows/**'

  dotfiles:
    needs: changes
    if: needs.changes.outputs.dotfiles == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-macos: 4000000000

      - name: CI
        run: nix develop --command make ci

  agents:
    needs: changes
    if: needs.changes.outputs.agents == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: agents/package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: agents/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:run
