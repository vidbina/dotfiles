name: Literate Config

# Triggers only when literate-config source files or CI config change.
#
# ⚠️  BRANCH PROTECTION WARNING — READ BEFORE ADDING REQUIRED STATUS CHECKS
# Native on.paths filtering means this workflow does NOT run when unmatched
# paths change. GitHub will show no status for this check on those PRs.
# If branch protection requires this check to pass, those PRs will be
# blocked from merging because the check never appears — not because it
# failed, but because it was never triggered.
#
# Solutions (pick one):
#   A. Do not mark this workflow's jobs as required status checks.
#   B. Switch to a paths-filter job (dorny/paths-filter) so jobs are
#      *skipped* rather than absent — skipped counts as passing for
#      required checks.
#
# GitHub docs:
#   Required status checks:
#     https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-protected-branches/about-protected-branches#require-status-checks-before-merging
#   Workflow trigger path filters:
#     https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#running-your-workflow-only-when-a-push-affects-specific-files

on:
  push:
    branches: [main]
    paths:
      - '**/*.org'
      - 'flake.nix'
      - 'flake.lock'
      - 'Makefile'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/*.org'
      - 'flake.nix'
      - 'flake.lock'
      - 'Makefile'
      - '.github/workflows/**'

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-macos: 4000000000

      - name: Check config
        run: nix develop --command make check-config
